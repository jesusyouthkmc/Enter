<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jesus Youth KMC | Enter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== MAIN ORANGE GRADIENT BACKGROUND (same as main site) ===== */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 50%, #F25E2C 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* subtle animated overlay for depth (very soft) */
    .animated-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, rgba(255,140,66,0.12) 0%, rgba(255,107,53,0.2) 30%, rgba(242,94,44,0.1) 60%, rgba(255,140,66,0.12) 100%);
      background-size: 200% 200%;
      animation: shiftGradient 14s ease infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes shiftGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* very light vignette for depth */
    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ===== BACKGROUND WATERMARK LOGO (starts visible, fades with button) ===== */
    .bg-watermark {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      object-fit: contain;
      bottom: 20px;
      right: -100px;
      width: 70%;
      max-width: 800px;
      opacity: 0.14;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @media (min-width: 768px) {
      .bg-watermark {
        right: -150px;
        bottom: 50px;
        width: 60%;
        opacity: 0.12;
      }
    }
    @media (min-width: 1024px) {
      .bg-watermark {
        right: -200px;
        bottom: 80px;
        width: 50%;
        opacity: 0.1;
      }
    }

    /* ===== RISING LOGO (the main logo that animates) ===== */
    .rising-logo {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      object-fit: contain;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      max-width: 380px;
      opacity: 0;  /* hidden initially, will become visible during animation */
      bottom: -250px;
      transition: none;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }

    /* responsive sizing for rising logo */
    @media (min-width: 768px) {
      .rising-logo { width: 40%; max-width: 340px; }
    }
    @media (min-width: 1024px) {
      .rising-logo { width: 28%; max-width: 360px; }
    }

    /* ===== ENTER BUTTON CONTAINER ===== */
    .enter-container {
      position: relative;
      z-index: 20;
      text-align: center;
      padding: 2rem;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    /* pulsing ENTER button — glass pill style, matching theme */
    .enter-btn {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 100px;
      padding: 1rem 3rem;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(255,255,255,0.2), 0 0 20px rgba(255,140,66,0.2);
      animation: gentlePulse 2.2s infinite ease-in-out;
      font-family: inherit;
    }

    .enter-btn:hover {
      transform: scale(1.02);
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 18px rgba(255,255,255,0.4), 0 0 30px rgba(255,140,66,0.35);
    }

    @keyframes gentlePulse {
      0% { transform: scale(1); box-shadow: 0 0 12px rgba(255,255,255,0.2), 0 0 20px rgba(255,140,66,0.2); border-color: rgba(255,255,255,0.4); }
      50% { transform: scale(1.02); box-shadow: 0 0 22px rgba(255,255,255,0.35), 0 0 38px rgba(255,140,66,0.35); border-color: rgba(255,255,255,0.65); }
      100% { transform: scale(1); box-shadow: 0 0 12px rgba(255,255,255,0.2), 0 0 20px rgba(255,140,66,0.2); border-color: rgba(255,255,255,0.4); }
    }

    .launch-sub {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    /* responsive button */
    @media (max-width: 550px) {
      .enter-btn { font-size: 1.2rem; padding: 0.8rem 2rem; letter-spacing: 3px; }
      .launch-sub { font-size: 0.65rem; }
    }

    /* fade-out class for button container + watermark */
    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) !important;
      pointer-events: none;
    }

    /* hide container after fade (optional) */
    .hidden-visually {
      visibility: hidden;
    }

    /* ----- ANIMATION SEQUENCE FOR RISING LOGO (no neon, just clean glow) ----- */
    /* 1. rise from bottom to center */
    @keyframes riseToCenter {
      0% {
        bottom: -250px;
        opacity: 0;
        transform: translateX(-50%) scale(0.94);
      }
      35% {
        opacity: 0.7;
      }
      100% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.65;   /* reduced opacity as requested */
      }
    }

    /* 2. subtle glow once (no neon pulse, just a soft glow then fade) */
    @keyframes softGlowOnce {
      0% {
        filter: drop-shadow(0 0 0px rgba(255,255,200,0));
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(255,220,150,0.5)) drop-shadow(0 0 4px rgba(255,140,66,0.4));
      }
      100% {
        filter: drop-shadow(0 0 2px rgba(255,255,210,0.2));
      }
    }

    /* 3. rise up and disappear gracefully */
    @keyframes riseUpDisappear {
      0% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.65;
      }
      100% {
        bottom: 140%;
        transform: translate(-50%, 50%) scale(1.05);
        opacity: 0;
        visibility: hidden;
      }
    }

    /* class that triggers the full 3-step animation */
    .logo-animate-sequence {
      animation: 
        riseToCenter 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards,
        softGlowOnce 0.65s ease-out 0.95s forwards,
        riseUpDisappear 1.1s cubic-bezier(0.4, 0, 0.2, 1) 1.7s forwards;
    }
  </style>
</head>
<body>

  <!-- background depth layers -->
  <div class="animated-gradient"></div>
  <div class="vignette"></div>

  <!-- BACKGROUND WATERMARK LOGO (fades together with Enter button) -->
  <img src="logo.png" alt="background watermark" class="bg-watermark" id="bgWatermark">

  <!-- RISING LOGO (the main logo that will animate after click) -->
  <img src="logo.png" alt="Jesus Youth KMC" class="rising-logo" id="risingLogo">

  <!-- ENTER BUTTON CONTAINER -->
  <div id="enterContainer" class="enter-container">
    <button id="enterBtn" class="enter-btn">ENTER</button>
    <div class="launch-sub">Jesus Youth KMC · Medical College Campus Ministry</div>
  </div>

  <script>
    (function() {
      // DOM elements
      const enterBtn = document.getElementById('enterBtn');
      const container = document.getElementById('enterContainer');
      const bgWatermark = document.getElementById('bgWatermark');
      const risingLogo = document.getElementById('risingLogo');
      const targetURL = 'https://jesusyouthkmc.github.io/jykmc.github.io/';

      let animationInProgress = false;

      // ensure rising logo is fully hidden at start
      risingLogo.style.opacity = '0';
      risingLogo.style.bottom = '-250px';
      risingLogo.classList.remove('logo-animate-sequence');

      function startSequence() {
        if (animationInProgress) return;
        animationInProgress = true;

        // disable button & add body state
        enterBtn.disabled = true;
        document.body.style.cursor = 'wait';

        // 1️⃣ Fade out ENTER button container + background watermark logo together
        container.classList.add('fade-out');
        if (bgWatermark) bgWatermark.classList.add('fade-out');

        // after fade completes, hide containers to avoid layout interference
        setTimeout(() => {
          container.style.visibility = 'hidden';
          if (bgWatermark) bgWatermark.style.visibility = 'hidden';
          
          // 2️⃣ Prepare rising logo: ensure it starts from bottom hidden
          // reset any inline leftovers
          risingLogo.style.visibility = 'visible';
          risingLogo.style.opacity = '0';
          risingLogo.style.bottom = '-250px';
          risingLogo.style.transform = 'translateX(-50%)';
          
          // force reflow to restart animation fresh
          void risingLogo.offsetHeight;
          
          // 3️⃣ trigger the 3-step animation: rise to center → glow once → rise up & vanish
          risingLogo.classList.add('logo-animate-sequence');
          
          // 4️⃣ after the entire logo animation completes, redirect to main website
          // total animation time: riseToCenter 0.9s + delay + softGlowOnce 0.65s + riseUpDisappear 1.1s (starts at 1.7s)
          // total ≈ 0.9s + 0.65s + 1.1s = 2.65s + small gaps = ~2850ms after logo start
          const logoAnimationDuration = 2850; 
          // plus initial fade-out took about 550ms, but we start logo after that fade. Total redirect delay from click: ~3400ms
          setTimeout(() => {
            window.location.href = targetURL;
          }, 550 + logoAnimationDuration); // 550ms fade + 2.85s logo anim
          
        }, 520); // match fade-out transition duration
      }

      // attach click event
      if (enterBtn) {
        enterBtn.addEventListener('click', startSequence);
      }

      // small fallback: ensure that if the logo fails to load, animation still continues gracefully
      window.addEventListener('load', function() {
        // pre-set any additional styling: bg watermark visibility already fine
        risingLogo.style.opacity = '0';
      });
    })();
  </script>
</body>
</html>
