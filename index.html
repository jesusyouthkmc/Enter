<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jesus Youth KMC | Enter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 50%, #F25E2C 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .animated-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, rgba(255,140,66,0.12) 0%, rgba(255,107,53,0.2) 30%, rgba(242,94,44,0.1) 60%, rgba(255,140,66,0.12) 100%);
      background-size: 200% 200%;
      animation: shiftGradient 14s ease infinite;
      pointer-events: none;
      z-index: 1;
    }
    
    @keyframes shiftGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
      overflow: hidden;
    }

    .water-ripple {
      position: absolute;
      width: 0;
      height: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
    }

    .water-ripple.primary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.5) 0%, 
        rgba(255, 200, 100, 0.3) 30%, 
        rgba(255, 140, 66, 0.15) 60%, 
        transparent 80%);
      box-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
    }

    .water-ripple.primary.animate {
      animation: largeRippleExpand 1.5s ease-out forwards;
    }

    .water-ripple.secondary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.35) 0%, 
        rgba(255, 200, 100, 0.2) 40%, 
        rgba(255, 140, 66, 0.1) 70%, 
        transparent 90%);
    }

    .water-ripple.secondary.animate {
      animation: largeRippleExpand 1.5s ease-out 0.25s forwards;
    }

    .water-ripple.tertiary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.25) 0%, 
        rgba(255, 200, 100, 0.15) 50%, 
        rgba(255, 140, 66, 0.08) 80%, 
        transparent 100%);
    }

    .water-ripple.tertiary.animate {
      animation: largeRippleExpand 1.5s ease-out 0.55s forwards;
    }

    @keyframes largeRippleExpand {
      0% {
        width: 0;
        height: 0;
        opacity: 0.8;
      }
      15% {
        opacity: 0.9;
      }
      40% {
        width: 400px;
        height: 400px;
        opacity: 0.6;
      }
      70% {
        width: 800px;
        height: 800px;
        opacity: 0.35;
      }
      100% {
        width: 1500px;
        height: 1500px;
        opacity: 0;
      }
    }

    @media (min-width: 1200px) {
      @keyframes largeRippleExpand {
        0% {
          width: 0;
          height: 0;
          opacity: 0.8;
        }
        15% {
          opacity: 0.9;
        }
        40% {
          width: 600px;
          height: 600px;
          opacity: 0.6;
        }
        70% {
          width: 1200px;
          height: 1200px;
          opacity: 0.35;
        }
        100% {
          width: 2200px;
          height: 2200px;
          opacity: 0;
        }
      }
    }

    .bg-watermark {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      object-fit: contain;
      bottom: 20px;
      right: -100px;
      width: 70%;
      max-width: 800px;
      opacity: 0.14;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @media (min-width: 768px) {
      .bg-watermark {
        right: -150px;
        bottom: 50px;
        width: 60%;
        opacity: 0.12;
      }
    }
    @media (min-width: 1024px) {
      .bg-watermark {
        right: -200px;
        bottom: 80px;
        width: 50%;
        opacity: 0.1;
      }
    }

    .rising-logo {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      object-fit: contain;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      max-width: 380px;
      opacity: 0;
      bottom: -250px;
      transition: none;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }

    @media (min-width: 768px) {
      .rising-logo { width: 40%; max-width: 340px; }
    }
    @media (min-width: 1024px) {
      .rising-logo { width: 28%; max-width: 360px; }
    }

    .enter-container {
      position: relative;
      z-index: 20;
      text-align: center;
      padding: 2rem;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }
    
    .pulse-button {
      animation: pulse 2s infinite;
    }
    
    .pulse-button:hover {
      animation: none;
      transform: scale(1.05);
    }

    .enter-btn {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 100px;
      padding: 1rem 3rem;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .enter-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 18px rgba(255,255,255,0.3);
    }

    .launch-sub {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    @media (max-width: 550px) {
      .enter-btn { font-size: 1.2rem; padding: 0.8rem 2rem; letter-spacing: 3px; }
      .launch-sub { font-size: 0.65rem; }
    }

    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) !important;
      pointer-events: none;
    }

    @keyframes riseToCenter {
      0% {
        bottom: -250px;
        opacity: 0;
        transform: translateX(-50%) scale(0.94);
      }
      35% {
        opacity: 0.4;
      }
      100% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.35;
      }
    }

    @keyframes softGlowOnce {
      0% {
        filter: drop-shadow(0 0 0px rgba(255,255,200,0));
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(255,220,150,0.4)) drop-shadow(0 0 4px rgba(255,140,66,0.3));
      }
      100% {
        filter: drop-shadow(0 0 2px rgba(255,255,210,0.15));
      }
    }

    @keyframes riseUpDisappear {
      0% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.35;
      }
      100% {
        bottom: 140%;
        transform: translate(-50%, 50%) scale(1.05);
        opacity: 0;
        visibility: hidden;
      }
    }

    .logo-animate-sequence {
      animation: 
        riseToCenter 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards,
        softGlowOnce 0.65s ease-out 0.95s forwards,
        riseUpDisappear 1.1s cubic-bezier(0.4, 0, 0.2, 1) 1.7s forwards;
    }
  </style>
</head>
<body>

  <div class="animated-gradient"></div>
  <div class="vignette"></div>
  <div class="ripple-container" id="rippleContainer"></div>

  <img src="logo.png" alt="background watermark" class="bg-watermark" id="bgWatermark">
  <img src="logo.png" alt="Jesus Youth KMC" class="rising-logo" id="risingLogo">

  <div id="enterContainer" class="enter-container">
    <button id="enterBtn" class="enter-btn pulse-button">ENTER</button>
    <div class="launch-sub">Jesus Youth KMC · Kottayam Medical College Campus Ministry</div>
  </div>

  <script>
    (function() {
      // Get elements
      const enterBtn = document.getElementById('enterBtn');
      const container = document.getElementById('enterContainer');
      const bgWatermark = document.getElementById('bgWatermark');
      const risingLogo = document.getElementById('risingLogo');
      const rippleContainer = document.getElementById('rippleContainer');
      const targetURL = 'https://jesusyouthkmc.github.io/jykmc.github.io/';
      
      let animationInProgress = false;
      let ripplesTriggered = false;
      let soundPlayed = false;
      
      // Create audio element with your existing click-sound.mp3 file
      const clickSound = new Audio();
      clickSound.src = 'click-sound.mp3';  // Using your existing file
      clickSound.preload = 'auto';
      clickSound.volume = 0.8;
      
      // Load the sound
      clickSound.load();
      
      // Function to play sound - simplified and robust
      function playClickSound() {
        if (soundPlayed) return;
        
        // Reset to beginning and play
        clickSound.currentTime = 0;
        
        const playPromise = clickSound.play();
        
        if (playPromise !== undefined) {
          playPromise
            .then(() => {
              console.log('✓ Sound played successfully!');
              soundPlayed = true;
            })
            .catch(error => {
              console.error('✗ Sound failed:', error.name, error.message);
              
              // Fallback: Try WebAudio beep if regular audio fails
              try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (AudioCtx) {
                  const ctx = new AudioCtx();
                  const now = ctx.currentTime;
                  const gain = ctx.createGain();
                  gain.connect(ctx.destination);
                  gain.gain.value = 0.3;
                  
                  // Create a short beep
                  const osc = ctx.createOscillator();
                  osc.connect(gain);
                  osc.frequency.value = 880;
                  osc.start();
                  gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.15);
                  osc.stop(now + 0.15);
                  
                  ctx.resume().then(() => {
                    console.log('✓ Fallback beep played');
                    soundPlayed = true;
                    setTimeout(() => ctx.close(), 200);
                  });
                }
              } catch(e) {
                console.error('✗ Fallback also failed:', e);
              }
            });
        }
      }
      
      // Water ripple effect
      function createWaterRipple() {
        if (ripplesTriggered) return;
        ripplesTriggered = true;
        
        const twoCmInPixels = Math.min(85, Math.max(65, window.innerHeight * 0.09));
        const centerX = window.innerWidth / 2;
        const centerY = (window.innerHeight / 2) - twoCmInPixels;
        
        rippleContainer.innerHTML = '';
        
        const ripple1 = document.createElement('div');
        ripple1.className = 'water-ripple primary animate';
        ripple1.style.left = centerX + 'px';
        ripple1.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple1);
        
        const ripple2 = document.createElement('div');
        ripple2.className = 'water-ripple secondary animate';
        ripple2.style.left = centerX + 'px';
        ripple2.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple2);
        
        const ripple3 = document.createElement('div');
        ripple3.className = 'water-ripple tertiary animate';
        ripple3.style.left = centerX + 'px';
        ripple3.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple3);
        
        setTimeout(() => {
          rippleContainer.innerHTML = '';
        }, 2000);
      }
      
      // Initialize logo state
      risingLogo.style.opacity = '0';
      risingLogo.style.bottom = '-250px';
      risingLogo.classList.remove('logo-animate-sequence');
      
      // Main sequence when ENTER is clicked
      function startSequence(event) {
        event.preventDefault();
        
        if (animationInProgress) return;
        animationInProgress = true;
        
        console.log('ENTER clicked - playing sound...');
        
        // PLAY THE SOUND - This runs directly from user click
        playClickSound();
        
        // Disable button
        enterBtn.disabled = true;
        enterBtn.classList.remove('pulse-button');
        enterBtn.style.animation = 'none';
        document.body.style.cursor = 'wait';
        
        // Fade out button and watermark
        container.classList.add('fade-out');
        if (bgWatermark) bgWatermark.classList.add('fade-out');
        
        setTimeout(() => {
          container.style.visibility = 'hidden';
          if (bgWatermark) bgWatermark.style.visibility = 'hidden';
          
          // Start rising logo animation
          risingLogo.style.visibility = 'visible';
          risingLogo.style.opacity = '0';
          risingLogo.style.bottom = '-250px';
          risingLogo.style.transform = 'translateX(-50%)';
          
          void risingLogo.offsetHeight;
          risingLogo.classList.add('logo-animate-sequence');
          
          // Trigger water ripple
          setTimeout(() => {
            createWaterRipple();
          }, 900);
          
          // Redirect after animation
          setTimeout(() => {
            window.location.href = targetURL;
          }, 3500);
          
        }, 520);
      }
      
      // Attach click event to button
      if (enterBtn) {
        enterBtn.addEventListener('click', startSequence);
      }
      
      // Pre-warm audio on first touch (helps iOS unlock)
      let warmedUp = false;
      function warmupAudio() {
        if (warmedUp) return;
        warmedUp = true;
        console.log('Warming up audio system...');
        // Just load and prepare the audio without playing
        clickSound.load();
        document.removeEventListener('touchstart', warmupAudio);
        document.removeEventListener('touchend', warmupAudio);
        document.removeEventListener('mousedown', warmupAudio);
      }
      
      document.addEventListener('touchstart', warmupAudio);
      document.addEventListener('touchend', warmupAudio);
      document.addEventListener('mousedown', warmupAudio);
      
      console.log('=== Page Ready ===');
      console.log('Sound file: click-sound.mp3');
      console.log('Click ENTER button to play sound and continue');
    })();
  </script>
</body>
</html>
