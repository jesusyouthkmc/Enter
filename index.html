<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jesus Youth KMC | Enter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== MAIN ORANGE GRADIENT BACKGROUND ===== */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 50%, #F25E2C 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* subtle animated overlay for depth */
    .animated-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, rgba(255,140,66,0.12) 0%, rgba(255,107,53,0.2) 30%, rgba(242,94,44,0.1) 60%, rgba(255,140,66,0.12) 100%);
      background-size: 200% 200%;
      animation: shiftGradient 14s ease infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes shiftGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* light vignette for depth */
    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ===== LARGE WATER DROPLET RIPPLE EFFECT ===== */
    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
      overflow: hidden;
    }

    .water-ripple {
      position: absolute;
      width: 0;
      height: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
    }

    /* Primary ripple - largest and most visible */
    .water-ripple.primary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.5) 0%, 
        rgba(255, 200, 100, 0.3) 30%, 
        rgba(255, 140, 66, 0.15) 60%, 
        transparent 80%);
      box-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
    }

    .water-ripple.primary.animate {
      animation: largeRippleExpand 1.5s ease-out forwards;
    }

    /* Secondary ripple - slightly delayed */
    .water-ripple.secondary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.35) 0%, 
        rgba(255, 200, 100, 0.2) 40%, 
        rgba(255, 140, 66, 0.1) 70%, 
        transparent 90%);
    }

    .water-ripple.secondary.animate {
      animation: largeRippleExpand 1.5s ease-out 0.25s forwards;
    }

    /* Tertiary ripple - longest delay, most subtle */
    .water-ripple.tertiary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.25) 0%, 
        rgba(255, 200, 100, 0.15) 50%, 
        rgba(255, 140, 66, 0.08) 80%, 
        transparent 100%);
    }

    .water-ripple.tertiary.animate {
      animation: largeRippleExpand 1.5s ease-out 0.55s forwards;
    }

    @keyframes largeRippleExpand {
      0% {
        width: 0;
        height: 0;
        opacity: 0.8;
      }
      15% {
        opacity: 0.9;
      }
      40% {
        width: 400px;
        height: 400px;
        opacity: 0.6;
      }
      70% {
        width: 800px;
        height: 800px;
        opacity: 0.35;
      }
      100% {
        width: 1500px;
        height: 1500px;
        opacity: 0;
      }
    }

    /* Extra large screens need even bigger ripples */
    @media (min-width: 1200px) {
      @keyframes largeRippleExpand {
        0% {
          width: 0;
          height: 0;
          opacity: 0.8;
        }
        15% {
          opacity: 0.9;
        }
        40% {
          width: 600px;
          height: 600px;
          opacity: 0.6;
        }
        70% {
          width: 1200px;
          height: 1200px;
          opacity: 0.35;
        }
        100% {
          width: 2200px;
          height: 2200px;
          opacity: 0;
        }
      }
    }

    /* ===== BACKGROUND WATERMARK LOGO ===== */
    .bg-watermark {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      object-fit: contain;
      bottom: 20px;
      right: -100px;
      width: 70%;
      max-width: 800px;
      opacity: 0.14;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @media (min-width: 768px) {
      .bg-watermark {
        right: -150px;
        bottom: 50px;
        width: 60%;
        opacity: 0.12;
      }
    }
    @media (min-width: 1024px) {
      .bg-watermark {
        right: -200px;
        bottom: 80px;
        width: 50%;
        opacity: 0.1;
      }
    }

    /* ===== RISING LOGO ===== */
    .rising-logo {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      object-fit: contain;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      max-width: 380px;
      opacity: 0;
      bottom: -250px;
      transition: none;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }

    @media (min-width: 768px) {
      .rising-logo { width: 40%; max-width: 340px; }
    }
    @media (min-width: 1024px) {
      .rising-logo { width: 28%; max-width: 360px; }
    }

    /* ===== ENTER BUTTON CONTAINER ===== */
    .enter-container {
      position: relative;
      z-index: 20;
      text-align: center;
      padding: 2rem;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    /* ===== PULSING ANIMATION FOR ENTER BUTTON ===== */
    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }
    
    .pulse-button {
      animation: pulse 2s infinite;
    }
    
    .pulse-button:hover {
      animation: none;
      transform: scale(1.05);
    }

    /* ENTER button styling */
    .enter-btn {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 100px;
      padding: 1rem 3rem;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .enter-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 18px rgba(255,255,255,0.3);
    }

    .launch-sub {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    @media (max-width: 550px) {
      .enter-btn { font-size: 1.2rem; padding: 0.8rem 2rem; letter-spacing: 3px; }
      .launch-sub { font-size: 0.65rem; }
    }

    /* fade-out class for button container + watermark */
    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) !important;
      pointer-events: none;
    }

    /* ----- ANIMATION SEQUENCE FOR RISING LOGO ----- */
    @keyframes riseToCenter {
      0% {
        bottom: -250px;
        opacity: 0;
        transform: translateX(-50%) scale(0.94);
      }
      35% {
        opacity: 0.4;
      }
      100% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.35;
      }
    }

    @keyframes softGlowOnce {
      0% {
        filter: drop-shadow(0 0 0px rgba(255,255,200,0));
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(255,220,150,0.4)) drop-shadow(0 0 4px rgba(255,140,66,0.3));
      }
      100% {
        filter: drop-shadow(0 0 2px rgba(255,255,210,0.15));
      }
    }

    @keyframes riseUpDisappear {
      0% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.35;
      }
      100% {
        bottom: 140%;
        transform: translate(-50%, 50%) scale(1.05);
        opacity: 0;
        visibility: hidden;
      }
    }

    .logo-animate-sequence {
      animation: 
        riseToCenter 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards,
        softGlowOnce 0.65s ease-out 0.95s forwards,
        riseUpDisappear 1.1s cubic-bezier(0.4, 0, 0.2, 1) 1.7s forwards;
    }
  </style>
</head>
<body>

  <!-- background depth layers -->
  <div class="animated-gradient"></div>
  <div class="vignette"></div>

  <!-- Ripple Container for water droplet effect -->
  <div class="ripple-container" id="rippleContainer"></div>

  <!-- BACKGROUND WATERMARK LOGO -->
  <img src="logo.png" alt="background watermark" class="bg-watermark" id="bgWatermark">

  <!-- RISING LOGO -->
  <img src="logo.png" alt="Jesus Youth KMC" class="rising-logo" id="risingLogo">

  <!-- ENTER BUTTON CONTAINER -->
  <div id="enterContainer" class="enter-container">
    <button id="enterBtn" class="enter-btn pulse-button">ENTER</button>
    <div class="launch-sub">Jesus Youth KMC · Kottayam Medical College Campus Ministry</div>
  </div>

  <!-- ========== ADVANCED AUDIO SYSTEM FOR iPAD ========== -->
  <!-- Silent WebAudio context to unlock audio on iOS/iPadOS -->
  <script>
    (function() {
      // ===== CORE FIX: iOS/ iPadOS requires AudioContext to be created and resumed inside a user gesture =====
      // We'll use both a silent WebAudio context and an <audio> element backup, ensuring the sound plays on any click.
      
      let audioUnlocked = false;
      let activeAudioContext = null;
      let soundBuffer = null;
      let audioTag = null;
      let soundPlayed = false;
      
      // Configuration: use a reliable short click sound (base64 dataURI fallback to guarantee sound even if external mp3 missing)
      // This is a very short 'pop' beep that works universally, but we still attempt to load external click-sound.mp3 if available.
      // However, to avoid "file not found" silence, we embed a tiny synthesized beep via WebAudio as fallback.
      
      // Function to create a short beep/click sound using WebAudio (sine wave + quick envelope)
      function createBeepBuffer(context) {
        const sampleRate = context.sampleRate;
        const duration = 0.12; // 120ms short click
        const frameCount = sampleRate * duration;
        const buffer = context.createBuffer(1, frameCount, sampleRate);
        const data = buffer.getChannelData(0);
        
        // Frequency sweep: 800Hz to 400Hz to mimic a soft but clear "tap"
        for (let i = 0; i < frameCount; i++) {
          const t = i / sampleRate; // time in seconds
          let freq = 820 * (1 - t * 1.8);
          if (freq < 380) freq = 380;
          const envelope = Math.exp(-t * 25) * 0.45;
          let sample = Math.sin(2 * Math.PI * freq * t) * envelope;
          // fast click attack: quick fade-in
          const attack = Math.min(1.0, t * 60);
          sample = sample * attack;
          data[i] = sample * 0.7;
        }
        return buffer;
      }
      
      // Load external sound if exists, but ensure fallback beep always works
      function initAudioSystem() {
        // Create hidden audio element for <audio> tag approach (backup)
        audioTag = document.createElement('audio');
        audioTag.preload = 'auto';
        audioTag.style.display = 'none';
        // Try to load external click-sound.mp3 if available, but not mandatory.
        // Even if file missing, we will still play WebAudio beep.
        audioTag.src = 'click-sound.mp3';
        audioTag.load();
        document.body.appendChild(audioTag);
      }
      
      // WebAudio unlock & play function – must be called within user gesture (click)
      function unlockAndPlaySound() {
        if (soundPlayed) return Promise.resolve(true);
        
        return new Promise(async (resolve) => {
          try {
            // If WebAudio context not created, create it now (this must be inside user interaction)
            if (!activeAudioContext) {
              // Use 'webkitAudioContext' fallback for older iOS
              const AudioCtx = window.AudioContext || window.webkitAudioContext;
              if (AudioCtx) {
                activeAudioContext = new AudioCtx();
                // generate beep buffer
                soundBuffer = createBeepBuffer(activeAudioContext);
              }
            }
            
            // Attempt to resume and play WebAudio
            let webAudioPlayed = false;
            if (activeAudioContext && soundBuffer) {
              if (activeAudioContext.state === 'suspended') {
                await activeAudioContext.resume();
              }
              // create source and play beep
              const source = activeAudioContext.createBufferSource();
              source.buffer = soundBuffer;
              source.connect(activeAudioContext.destination);
              source.start(0);
              webAudioPlayed = true;
              soundPlayed = true;
              resolve(true);
            }
            
            // Additionally try HTMLAudioElement as fallback (for regular mp3)
            if (audioTag && !webAudioPlayed) {
              audioTag.currentTime = 0;
              const playPromise = audioTag.play();
              if (playPromise !== undefined) {
                playPromise.catch(e => {
                  // Ignore error if WebAudio already played
                  if (!webAudioPlayed) console.warn("HTMLAudio playback failed:", e);
                }).then(() => {
                  if (!soundPlayed) {
                    soundPlayed = true;
                    resolve(true);
                  }
                });
              } else {
                if (!soundPlayed) resolve(true);
              }
            } else if (!webAudioPlayed) {
              // Last resort: create a one-off WebAudio context if activeAudioContext failed somehow
              const AudioCtx = window.AudioContext || window.webkitAudioContext;
              if (AudioCtx) {
                const tempCtx = new AudioCtx();
                const tempBuffer = createBeepBuffer(tempCtx);
                await tempCtx.resume();
                const source = tempCtx.createBufferSource();
                source.buffer = tempBuffer;
                source.connect(tempCtx.destination);
                source.start(0);
                soundPlayed = true;
                // auto close after short delay
                setTimeout(() => { tempCtx.close(); }, 500);
                resolve(true);
              } else {
                resolve(false);
              }
            } else {
              resolve(true);
            }
          } catch (err) {
            console.warn("WebAudio play error:", err);
            resolve(false);
          }
        });
      }
      
      // Pre-warm but don't play yet — create context in advance? For iOS we must create context inside click.
      // But we can attach a dummy "touchstart" listener to prepare?
      // However to keep things clean: We'll just call unlockAndPlaySound on first ENTER click.
      
      // Setup audio background: attach a single "any touch/click" to early create AudioContext?
      // But better: create context on first real ENTER press. That's guaranteed user gesture.
      // Also for iPad, we might need a "silent" playback to unlock audio permanently, but ENTER button itself is enough.
      
      // ===== The rest of original logic with enhanced sound =====
      
      const enterBtn = document.getElementById('enterBtn');
      const container = document.getElementById('enterContainer');
      const bgWatermark = document.getElementById('bgWatermark');
      const risingLogo = document.getElementById('risingLogo');
      const rippleContainer = document.getElementById('rippleContainer');
      const targetURL = 'https://jesusyouthkmc.github.io/jykmc.github.io/';
      
      let animationInProgress = false;
      let ripplesTriggered = false;
      
      initAudioSystem(); // initializes audio tag but doesn't play
      
      // ===== LARGE WATER RIPPLE EFFECT (starting point 2cm / ~75px higher) =====
      function createWaterRipple() {
        if (ripplesTriggered) return;
        ripplesTriggered = true;
        
        const twoCmInPixels = Math.min(85, Math.max(65, window.innerHeight * 0.09));
        const centerX = window.innerWidth / 2;
        const centerY = (window.innerHeight / 2) - twoCmInPixels;
        
        rippleContainer.innerHTML = '';
        
        const ripple1 = document.createElement('div');
        ripple1.className = 'water-ripple primary animate';
        ripple1.style.left = centerX + 'px';
        ripple1.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple1);
        
        const ripple2 = document.createElement('div');
        ripple2.className = 'water-ripple secondary animate';
        ripple2.style.left = centerX + 'px';
        ripple2.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple2);
        
        const ripple3 = document.createElement('div');
        ripple3.className = 'water-ripple tertiary animate';
        ripple3.style.left = centerX + 'px';
        ripple3.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple3);
        
        setTimeout(() => {
          rippleContainer.innerHTML = '';
        }, 2000);
      }
      
      risingLogo.style.opacity = '0';
      risingLogo.style.bottom = '-250px';
      risingLogo.classList.remove('logo-animate-sequence');
      
      async function startSequence() {
        if (animationInProgress) return;
        animationInProgress = true;
        
        // Play SOUND using our robust iPad-friendly method
        // This executes immediately inside user click gesture, so WebAudio will be allowed.
        await unlockAndPlaySound();
        
        // disable button and remove pulse class
        enterBtn.disabled = true;
        enterBtn.classList.remove('pulse-button');
        enterBtn.style.animation = 'none';
        document.body.style.cursor = 'wait';
        
        // Fade out ENTER button container + background watermark logo
        container.classList.add('fade-out');
        if (bgWatermark) bgWatermark.classList.add('fade-out');
        
        setTimeout(() => {
          container.style.visibility = 'hidden';
          if (bgWatermark) bgWatermark.style.visibility = 'hidden';
          
          risingLogo.style.visibility = 'visible';
          risingLogo.style.opacity = '0';
          risingLogo.style.bottom = '-250px';
          risingLogo.style.transform = 'translateX(-50%)';
          
          void risingLogo.offsetHeight;
          risingLogo.classList.add('logo-animate-sequence');
          
          setTimeout(() => {
            createWaterRipple();
          }, 900);
          
          const logoAnimationDuration = 2850;
          setTimeout(() => {
            window.location.href = targetURL;
          }, 550 + logoAnimationDuration);
          
        }, 520);
      }
      
      if (enterBtn) {
        // Remove any previous listeners to avoid double triggering
        enterBtn.removeEventListener('click', startSequence);
        enterBtn.addEventListener('click', startSequence);
      }
      
      // ===== EXTRA SAFETY: Pre-warm WebAudio on first ANY user interaction to ensure immediate unlock on iPad =====
      // iPad sometimes requires the AudioContext to be created inside a user gesture, but creation and resume
      // in same handler is fine. However some iPads need an explicit silent context creation + resume even before.
      // We'll add a one-time "pointerdown" or "touchstart" event on the document to warm up audio context early?
      // This ensures that subsequent ENTER click plays instantly, but the sound will still be triggered properly.
      // But no double-play: we will create context but not produce audible sound until ENTER.
      // This technique boosts reliability.
      let warmupDone = false;
      function warmupAudioOnFirstTouch() {
        if (warmupDone) return;
        warmupDone = true;
        // Create and suspend AudioContext silently – this unlocks the audio graph on iOS.
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          const warmCtx = new AudioCtx();
          // create empty gain and silent buffer to initialize?
          const silentBuffer = warmCtx.createBuffer(1, 1, 22050);
          const source = warmCtx.createBufferSource();
          source.buffer = silentBuffer;
          source.connect(warmCtx.destination);
          // resume and start silent buffer
          warmCtx.resume().then(() => {
            source.start(0);
            // After a tiny moment, we can suspend? But leave it open so that later we reuse context?
            // Actually we will not reuse to avoid complexity, but just creating and playing silent byte allows subsequent audio
            // But we already have activeAudioContext created on click. Yet this pre-warm makes iOS audio subsystem ready.
            setTimeout(() => {
              try { warmCtx.close(); } catch(e) {}
            }, 300);
          }).catch(e => console.log("warmup audio failed", e));
        }
        // Remove event listeners after warmup
        document.removeEventListener('touchstart', warmupAudioOnFirstTouch);
        document.removeEventListener('mousedown', warmupAudioOnFirstTouch);
      }
      // Attach early gesture detection for iPad (any touch on screen will prewarm)
      document.addEventListener('touchstart', warmupAudioOnFirstTouch, { once: false, passive: true });
      document.addEventListener('mousedown', warmupAudioOnFirstTouch);
      // But ensure we don't cause issues if user never touches screen — anyway ENTER click will trigger sound as well.
      
      // Also on page load, if on iPad, we also set a small indicator but no autoplay.
      window.addEventListener('load', function() {
        risingLogo.style.opacity = '0';
        // optional: manual preload of audio tag for better responsiveness
        if (audioTag) {
          audioTag.load();
        }
      });
      
    })();
  </script>
</body>
</html>
