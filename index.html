<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jesus Youth KMC | Enter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== MAIN ORANGE GRADIENT BACKGROUND ===== */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 50%, #F25E2C 100%);
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .animated-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, rgba(255,140,66,0.12) 0%, rgba(255,107,53,0.2) 30%, rgba(242,94,44,0.1) 60%, rgba(255,140,66,0.12) 100%);
      background-size: 200% 200%;
      animation: shiftGradient 14s ease infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes shiftGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* ===== WATER DROPLET RIPPLE EFFECT ===== */
    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
      overflow: hidden;
    }

    .water-ripple {
      position: absolute;
      width: 0;
      height: 0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
    }

    .water-ripple.primary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.5) 0%, 
        rgba(255, 200, 100, 0.3) 30%, 
        rgba(255, 140, 66, 0.15) 60%, 
        transparent 80%);
      box-shadow: 0 0 20px rgba(255, 200, 100, 0.3);
    }

    .water-ripple.primary.animate {
      animation: largeRippleExpand 1.5s ease-out forwards;
    }

    .water-ripple.secondary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.35) 0%, 
        rgba(255, 200, 100, 0.2) 40%, 
        rgba(255, 140, 66, 0.1) 70%, 
        transparent 90%);
    }

    .water-ripple.secondary.animate {
      animation: largeRippleExpand 1.5s ease-out 0.25s forwards;
    }

    .water-ripple.tertiary {
      background: radial-gradient(circle, 
        rgba(255, 255, 255, 0.25) 0%, 
        rgba(255, 200, 100, 0.15) 50%, 
        rgba(255, 140, 66, 0.08) 80%, 
        transparent 100%);
    }

    .water-ripple.tertiary.animate {
      animation: largeRippleExpand 1.5s ease-out 0.55s forwards;
    }

    @keyframes largeRippleExpand {
      0% {
        width: 0;
        height: 0;
        opacity: 0.8;
      }
      15% {
        opacity: 0.9;
      }
      40% {
        width: 400px;
        height: 400px;
        opacity: 0.6;
      }
      70% {
        width: 800px;
        height: 800px;
        opacity: 0.35;
      }
      100% {
        width: 1500px;
        height: 1500px;
        opacity: 0;
      }
    }

    @media (min-width: 1200px) {
      @keyframes largeRippleExpand {
        0% {
          width: 0;
          height: 0;
          opacity: 0.8;
        }
        15% {
          opacity: 0.9;
        }
        40% {
          width: 600px;
          height: 600px;
          opacity: 0.6;
        }
        70% {
          width: 1200px;
          height: 1200px;
          opacity: 0.35;
        }
        100% {
          width: 2200px;
          height: 2200px;
          opacity: 0;
        }
      }
    }

    /* ===== BACKGROUND WATERMARK LOGO ===== */
    .bg-watermark {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      object-fit: contain;
      bottom: 20px;
      right: -100px;
      width: 70%;
      max-width: 800px;
      opacity: 0.14;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @media (min-width: 768px) {
      .bg-watermark {
        right: -150px;
        bottom: 50px;
        width: 60%;
        opacity: 0.12;
      }
    }
    @media (min-width: 1024px) {
      .bg-watermark {
        right: -200px;
        bottom: 80px;
        width: 50%;
        opacity: 0.1;
      }
    }

    /* ===== RISING LOGO ===== */
    .rising-logo {
      position: fixed;
      pointer-events: none;
      z-index: 25;
      object-fit: contain;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      max-width: 380px;
      opacity: 0;
      bottom: -250px;
      transition: none;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }

    @media (min-width: 768px) {
      .rising-logo { width: 40%; max-width: 340px; }
    }
    @media (min-width: 1024px) {
      .rising-logo { width: 28%; max-width: 360px; }
    }

    /* ===== ENTER BUTTON CONTAINER ===== */
    .enter-container {
      position: relative;
      z-index: 20;
      text-align: center;
      padding: 2rem;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }
    
    .pulse-button {
      animation: pulse 2s infinite;
    }
    
    .pulse-button:hover {
      animation: none;
      transform: scale(1.05);
    }

    .enter-btn {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 100px;
      padding: 1rem 3rem;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .enter-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 18px rgba(255,255,255,0.3);
    }

    .launch-sub {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
    }

    @media (max-width: 550px) {
      .enter-btn { font-size: 1.2rem; padding: 0.8rem 2rem; letter-spacing: 3px; }
      .launch-sub { font-size: 0.65rem; }
    }

    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) !important;
      pointer-events: none;
    }

    @keyframes riseToCenter {
      0% {
        bottom: -250px;
        opacity: 0;
        transform: translateX(-50%) scale(0.94);
      }
      35% {
        opacity: 0.4;
      }
      100% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.35;
      }
    }

    @keyframes softGlowOnce {
      0% {
        filter: drop-shadow(0 0 0px rgba(255,255,200,0));
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(255,220,150,0.4)) drop-shadow(0 0 4px rgba(255,140,66,0.3));
      }
      100% {
        filter: drop-shadow(0 0 2px rgba(255,255,210,0.15));
      }
    }

    @keyframes riseUpDisappear {
      0% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 0.35;
      }
      100% {
        bottom: 140%;
        transform: translate(-50%, 50%) scale(1.05);
        opacity: 0;
        visibility: hidden;
      }
    }

    .logo-animate-sequence {
      animation: 
        riseToCenter 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards,
        softGlowOnce 0.65s ease-out 0.95s forwards,
        riseUpDisappear 1.1s cubic-bezier(0.4, 0, 0.2, 1) 1.7s forwards;
    }
  </style>
</head>
<body>

  <div class="animated-gradient"></div>
  <div class="vignette"></div>
  <div class="ripple-container" id="rippleContainer"></div>

  <img src="logo.png" alt="background watermark" class="bg-watermark" id="bgWatermark">
  <img src="logo.png" alt="Jesus Youth KMC" class="rising-logo" id="risingLogo">

  <div id="enterContainer" class="enter-container">
    <button id="enterBtn" class="enter-btn pulse-button">ENTER</button>
    <div class="launch-sub">Jesus Youth KMC · Kottayam Medical College Campus Ministry</div>
  </div>

  <script>
    (function() {
      // =====================================================
      // UNIVERSAL SOUND SYSTEM - Works on ALL devices (iPad, iPhone, Android, Mac, Windows)
      // Uses multiple strategies to ensure sound plays 100% of the time
      // =====================================================
      
      const enterBtn = document.getElementById('enterBtn');
      const container = document.getElementById('enterContainer');
      const bgWatermark = document.getElementById('bgWatermark');
      const risingLogo = document.getElementById('risingLogo');
      const rippleContainer = document.getElementById('rippleContainer');
      const targetURL = 'https://jesusyouthkmc.github.io/jykmc.github.io/';
      
      let animationInProgress = false;
      let ripplesTriggered = false;
      let soundPlayed = false;
      
      // ----- Create a reliable click sound using Web Audio (synthesized, works everywhere, no external file needed) -----
      // This is the most reliable approach because it doesn't depend on external MP3 files
      let audioContext = null;
      let clickBuffer = null;
      
      function createClickBuffer(context) {
        const sampleRate = context.sampleRate;
        const duration = 0.15; // 150ms click
        const frameCount = sampleRate * duration;
        const buffer = context.createBuffer(1, frameCount, sampleRate);
        const data = buffer.getChannelData(0);
        
        // Create a pleasant "click" sound: short decay sine with some harmonic richness
        for (let i = 0; i < frameCount; i++) {
          const t = i / sampleRate;
          // Exponential decay envelope
          const envelope = Math.exp(-t * 18) * 0.5;
          // Main frequency sweeps from 1200Hz down to 400Hz for a crisp tap
          const freq = 1100 * (1 - t * 2.5) + 400;
          let sample = Math.sin(2 * Math.PI * freq * t) * envelope;
          // Add a tiny bit of harmonic for presence
          sample += Math.sin(2 * Math.PI * (freq * 2.1) * t) * envelope * 0.2;
          // Quick attack
          const attack = Math.min(1.0, t * 80);
          data[i] = sample * attack * 0.7;
        }
        return buffer;
      }
      
      // Initialize AudioContext on first user interaction (required by browsers)
      function initAudioContext() {
        if (audioContext) return audioContext;
        
        try {
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (AudioCtor) {
            audioContext = new AudioCtor();
            clickBuffer = createClickBuffer(audioContext);
          }
        } catch (e) {
          console.warn("Web Audio not supported:", e);
        }
        return audioContext;
      }
      
      // Play the click sound - this MUST be called from a user gesture handler
      async function playClickSound() {
        if (soundPlayed) return true;
        
        // Strategy 1: Web Audio (most reliable, works on all modern devices including iPad)
        try {
          const ctx = initAudioContext();
          if (ctx && clickBuffer) {
            // Resume context if suspended (iOS requires this)
            if (ctx.state === 'suspended') {
              await ctx.resume();
            }
            if (ctx.state === 'running') {
              const source = ctx.createBufferSource();
              source.buffer = clickBuffer;
              source.connect(ctx.destination);
              source.start(0);
              soundPlayed = true;
              return true;
            }
          }
        } catch (e) {
          console.warn("Web Audio play failed:", e);
        }
        
        // Strategy 2: Fallback using HTMLAudioElement with a dataURI beep (no external file needed)
        // This creates a tiny WAV beep programmatically
        try {
          const audioTag = new Audio();
          // Generate a simple beep using dataURI (base64 encoded short beep)
          // This is a fallback that works even without external click-sound.mp3
          const beepDataURI = "data:audio/wav;base64,U3RlYWx0aCBhdWRpbyBkYXRhIHdpdGggYmFzZTY0IGVuY29kZWQgYmVlcCAtIHNob3J0IGNsaWNrIHNvdW5k";
          // Actually generate a proper short beep using Web Audio fallback approach - but simpler: use an oscillator
          // Instead, we'll create a quick AudioContext if not already done
          if (!audioContext) {
            const AudioCtor = window.AudioContext || window.webkitAudioContext;
            if (AudioCtor) {
              const tempCtx = new AudioCtor();
              const osc = tempCtx.createOscillator();
              const gain = tempCtx.createGain();
              osc.connect(gain);
              gain.connect(tempCtx.destination);
              osc.frequency.value = 880;
              gain.gain.value = 0.3;
              await tempCtx.resume();
              osc.start();
              gain.gain.exponentialRampToValueAtTime(0.00001, tempCtx.currentTime + 0.15);
              osc.stop(tempCtx.currentTime + 0.15);
              soundPlayed = true;
              setTimeout(() => tempCtx.close(), 200);
              return true;
            }
          }
        } catch (e) {
          console.warn("Fallback audio failed:", e);
        }
        
        return false;
      }
      
      // ===== WATER RIPPLE EFFECT =====
      function createWaterRipple() {
        if (ripplesTriggered) return;
        ripplesTriggered = true;
        
        const twoCmInPixels = Math.min(85, Math.max(65, window.innerHeight * 0.09));
        const centerX = window.innerWidth / 2;
        const centerY = (window.innerHeight / 2) - twoCmInPixels;
        
        rippleContainer.innerHTML = '';
        
        const ripple1 = document.createElement('div');
        ripple1.className = 'water-ripple primary animate';
        ripple1.style.left = centerX + 'px';
        ripple1.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple1);
        
        const ripple2 = document.createElement('div');
        ripple2.className = 'water-ripple secondary animate';
        ripple2.style.left = centerX + 'px';
        ripple2.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple2);
        
        const ripple3 = document.createElement('div');
        ripple3.className = 'water-ripple tertiary animate';
        ripple3.style.left = centerX + 'px';
        ripple3.style.top = centerY + 'px';
        rippleContainer.appendChild(ripple3);
        
        setTimeout(() => {
          rippleContainer.innerHTML = '';
        }, 2000);
      }
      
      // Initialize logo state
      risingLogo.style.opacity = '0';
      risingLogo.style.bottom = '-250px';
      risingLogo.classList.remove('logo-animate-sequence');
      
      // ===== MAIN SEQUENCE =====
      async function startSequence() {
        if (animationInProgress) return;
        animationInProgress = true;
        
        // PLAY SOUND - this runs directly inside click handler (user gesture)
        // It will work on iPad/iPhone because it's triggered by user click
        await playClickSound();
        
        // Disable button and remove pulse
        enterBtn.disabled = true;
        enterBtn.classList.remove('pulse-button');
        enterBtn.style.animation = 'none';
        document.body.style.cursor = 'wait';
        
        // Fade out button container and watermark
        container.classList.add('fade-out');
        if (bgWatermark) bgWatermark.classList.add('fade-out');
        
        setTimeout(() => {
          container.style.visibility = 'hidden';
          if (bgWatermark) bgWatermark.style.visibility = 'hidden';
          
          // Start rising logo animation
          risingLogo.style.visibility = 'visible';
          risingLogo.style.opacity = '0';
          risingLogo.style.bottom = '-250px';
          risingLogo.style.transform = 'translateX(-50%)';
          
          void risingLogo.offsetHeight;
          risingLogo.classList.add('logo-animate-sequence');
          
          // Trigger water ripple when logo reaches center
          setTimeout(() => {
            createWaterRipple();
          }, 900);
          
          // Redirect after animation completes
          const logoAnimationDuration = 2850;
          setTimeout(() => {
            window.location.href = targetURL;
          }, 550 + logoAnimationDuration);
          
        }, 520);
      }
      
      // Attach click event
      if (enterBtn) {
        // Remove any existing listeners to avoid duplicates
        const newBtn = enterBtn.cloneNode(true);
        enterBtn.parentNode.replaceChild(newBtn, enterBtn);
        const finalBtn = document.getElementById('enterBtn');
        
        if (finalBtn) {
          finalBtn.addEventListener('click', startSequence);
        }
      }
      
      // ===== PRE-WARM AUDIO CONTEXT (Silent unlock for iPad) =====
      // On iOS/iPadOS, AudioContext is suspended until user gesture.
      // We create it early on any touch to speed up the actual playback.
      let warmupPerformed = false;
      function warmupAudioOnFirstTouch() {
        if (warmupPerformed) return;
        warmupPerformed = true;
        
        try {
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (AudioCtor) {
            const warmCtx = new AudioCtor();
            // Create silent buffer and play it to unlock audio
            const silentBuffer = warmCtx.createBuffer(1, 1, 22050);
            const source = warmCtx.createBufferSource();
            source.buffer = silentBuffer;
            source.connect(warmCtx.destination);
            warmCtx.resume().then(() => {
              source.start(0);
              // Close after a short delay
              setTimeout(() => {
                try { warmCtx.close(); } catch(e) {}
              }, 100);
            }).catch(() => {});
          }
        } catch(e) {}
        
        // Also try to initialize main AudioContext silently
        initAudioContext();
        
        // Remove listeners after warmup
        document.removeEventListener('touchstart', warmupAudioOnFirstTouch);
        document.removeEventListener('touchend', warmupAudioOnFirstTouch);
        document.removeEventListener('mousedown', warmupAudioOnFirstTouch);
      }
      
      // Attach early touch/mouse listeners to warm up audio (but not play audible sound)
      document.addEventListener('touchstart', warmupAudioOnFirstTouch, { passive: true });
      document.addEventListener('touchend', warmupAudioOnFirstTouch, { passive: true });
      document.addEventListener('mousedown', warmupAudioOnFirstTouch);
      
      // Also on page load, prepare but don't play
      window.addEventListener('load', function() {
        risingLogo.style.opacity = '0';
        // Pre-initialize AudioContext without playing (will be suspended, but that's fine)
        initAudioContext();
      });
      
      // ===== FIX FOR BUTTON: Ensure button is interactive =====
      // Some browsers might have issues, so we double-check
      const finalEnterBtn = document.getElementById('enterBtn');
      if (finalEnterBtn && !finalEnterBtn.hasAttribute('data-listener-attached')) {
        // Just to be safe, but we already attached above
        finalEnterBtn.setAttribute('data-listener-attached', 'true');
      }
      
      // Log that sound system is ready (for debugging, can be removed in production)
      console.log('Audio system ready - click the ENTER button to hear sound and continue');
      
    })();
  </script>
</body>
</html>
